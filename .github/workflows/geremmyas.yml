name: Geremmyas

on:
  push:
    branches: [main]
    paths:
      - "assets.go"
      - "catalog/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - ".github/workflows/geremmyas.yml"
  pull_request:
    branches: [main]
    paths:
      - "assets.go"
      - "catalog/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - ".github/workflows/geremmyas.yml"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o "dist/geremmyas-${GOOS}-${GOARCH}${{ matrix.ext }}" \
            ./cmd/geremmyas

      - uses: actions/upload-artifact@v5
        with:
          name: geremmyas-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber

