name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - ".release-please-manifest.json"
      - "version.txt"
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck install.sh
          shellcheck uninstall.sh
          shellcheck project/.github/hooks/scripts/block-dangerous-commands.sh

  structure:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check expected files
        run: |
          test -f install.sh
          test -f uninstall.sh
          test -f README.md
          test -f go.mod
          test -f catalog/packs.json
          test -d cmd/geremmyas
          test -d internal/cli
          test -d user/prompts
          test -d project/.github/instructions
          test -d project/.github/agents
          test -d project/.github/skills
          test -d project/.github/hooks

  install-test:
    name: Binary Installer Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install binary from local checkout
        run: |
          export XDG_BIN_HOME="$RUNNER_TEMP/bin"
          GEREMMYAS_INSTALL_SOURCE=checkout bash install.sh install
          test -x "$XDG_BIN_HOME/geremmyas"
          "$XDG_BIN_HOME/geremmyas" list

      - name: Uninstall binary
        run: |
          export XDG_BIN_HOME="$RUNNER_TEMP/bin"
          bash install.sh uninstall
          test ! -e "$XDG_BIN_HOME/geremmyas"
